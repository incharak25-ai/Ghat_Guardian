<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghat-Guardian | Authenticate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #0b94ef;
      --green-dim:   rgba(24, 13, 231, 0.15);
      --green-glow:  rgba(10, 195, 228, 0.35);
      --green-line:  rgba(247, 249, 252, 0.2);
      --bg:          #060b14;
      --card-bg:     
      rgba(2, 5, 10, 0.94);
      --text:        #e0f5ee;
      --muted:       rgba(13, 102, 228, 0.5);
      --danger:      #FF0033;
      --danger-dim:  rgba(255,0,51,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--green-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--green-line) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 0 48px; }
    }

    /* ── Corner decorations ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(29,158,117,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 0%,   rgba(29,158,117,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Top system bar ── */
    .sys-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 0.5px solid var(--green-line);
      background: rgba(6,11,20,0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
    }

    .sys-bar .dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 0.5px solid var(--green-glow);
      border-radius: 12px;
      padding: 2.25rem 2rem 2rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      animation: cardIn 0.5s cubic-bezier(0.19,1,0.22,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* corner brackets */
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 18px; height: 18px;
      border-bottom: 1.5px solid var(--green);
      border-right:  1.5px solid var(--green);
      border-radius: 0 0 12px 0;
    }

    .bracket-tl {
      position: absolute;
      top: -1px; left: -1px;
      width: 18px; height: 18px;
      border-top:  1.5px solid var(--green);
      border-left: 1.5px solid var(--green);
      border-radius: 12px 0 0 0;
    }

    /* ── Logo ── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .shield-icon {
      width: 40px; height: 40px;
      background: var(--green-dim);
      border: 1px solid var(--green-glow);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shield-icon svg {
      width: 22px; height: 22px;
      stroke: var(--green);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.75rem;
    }

    .divider {
      height: 0.5px;
      background: var(--green-line);
      margin-bottom: 1.5rem;
    }

    /* ── Form labels ── */
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── Role selector ── */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .role-btn {
      background: var(--green-dim);
      border: 0.5px solid rgba(29,158,117,0.2);
      border-radius: 7px;
      padding: 10px 6px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .role-btn svg {
      display: block;
      margin: 0 auto 5px;
      width: 20px; height: 20px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.18s;
    }

    .role-btn:hover,
    .role-btn.active {
      border-color: var(--green);
      background: rgba(29,158,117,0.12);
      color: var(--green);
    }

    .role-btn:hover svg,
    .role-btn.active svg { stroke: var(--green); }

    /* ── Input fields ── */
    .input-wrap {
      display: flex;
      align-items: center;
      background: rgba(29,158,117,0.04);
      border: 0.5px solid rgba(29,158,117,0.22);
      border-radius: 7px;
      padding: 0 12px;
      height: 44px;
      margin-bottom: 1.1rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--green);
      background: rgba(29,158,117,0.09);
    }

    .input-wrap svg {
      width: 16px; height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text);
      caret-color: var(--green);
    }

    .input-wrap input::placeholder {
      color: rgba(29,158,117,0.28);
      font-size: 12px;
    }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-left: 8px;
      display: flex;
      align-items: center;
    }

    .eye-btn svg {
      margin: 0;
      width: 15px; height: 15px;
      stroke: var(--muted);
    }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      height: 46px;
      background: var(--green);
      border: none;
      border-radius: 7px;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #060b14;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.25rem;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .submit-btn:hover::after { transform: translateX(100%); }
    .submit-btn:hover { background: #22b888; transform: translateY(-1px); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #0f6e56; cursor: not-allowed; transform: none; }

    .submit-btn svg {
      width: 18px; height: 18px;
      stroke: #060b14;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Messages ── */
    .msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      border-radius: 5px;
      padding: 8px 12px;
      margin-top: 0.75rem;
      display: none;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .msg.error {
      color: var(--danger);
      background: var(--danger-dim);
      border: 0.5px solid rgba(255,0,51,0.3);
    }

    .msg.success {
      color: var(--green);
      background: rgba(29,158,117,0.08);
      border: 0.5px solid var(--green-glow);
      text-align: center;
    }

    .msg.show { display: block; }

    /* ── Footer status ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.25rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
    }

    .status-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      .card { padding: 1.75rem 1.25rem 1.5rem; }
      .logo-text { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- System bar -->
  <div class="sys-bar">
    <span><span class="dot"></span>GHAT-GUARDIAN v1.0</span>
    <span>NH75 CORRIDOR &mdash; SYSTEM ONLINE</span>
    <span id="sys-time">--:--:--</span>
  </div>

  <div class="page">
    <div class="card">
      <div class="bracket-tl"></div>

      <!-- Logo -->
      <div class="logo-row">
        <div class="shield-icon">
          <!-- Shield-check SVG -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
        <span class="logo-text">Ghat-Guardian</span>
      </div>
      <p class="tagline">Mountain Road Safety System</p>

      <div class="divider"></div>

      <!-- Role selector -->
      <span class="field-label">Access Role</span>
      <div class="role-grid">
        <button class="role-btn active" id="role-driver" onclick="selectRole('driver')" type="button">
          <!-- steering wheel icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="2"/>
            <line x1="12" y1="10" x2="12" y2="3"/>
            <line x1="10.4" y1="13" x2="3.5" y2="17.5"/>
            <line x1="13.6" y1="13" x2="20.5" y2="17.5"/>
          </svg>
          Driver
        </button>
        <button class="role-btn" id="role-rescue" onclick="selectRole('rescue')" type="button">
          <!-- hospital icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="6" width="18" height="15" rx="2"/>
            <path d="M3 10h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M12 13v4M10 15h4"/>
          </svg>
          Rescue Hub
        </button>
      </div>

      <!-- Vehicle / Unit ID -->
      <span class="field-label">Vehicle / Unit ID</span>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        <input type="text" id="vid" placeholder="e.g. KA-01-AB-1234" autocomplete="off" />
      </div>

      <!-- Driver / Operator Name -->
      <span class="field-label">Driver / Operator Name</span>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="dname" placeholder="Full name" autocomplete="off" />
      </div>

      <!-- Passcode -->
      <span class="field-label">Passcode</span>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" />
        <button class="eye-btn" type="button" onclick="togglePass()" title="Show/hide passcode" aria-label="Toggle password visibility">
          <svg id="eye-icon" viewBox="0 0 24 24" aria-hidden="true" style="stroke:rgba(29,158,117,0.5);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Error / Success messages -->
      <div class="msg error" id="err-msg"></div>
      <div class="msg success" id="suc-msg"></div>

      <!-- Submit -->
      <button class="submit-btn" id="login-btn" onclick="handleLogin()" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        Authenticate
      </button>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>SYSTEM ONLINE &mdash; NH75 CORRIDOR ACTIVE</span>
      </div>
    </div>
  </div>

  <script>
    /* ── Live clock ── */
    function tick() {
      const now = new Date();
      document.getElementById('sys-time').textContent =
        now.toLocaleTimeString('en-IN', { hour12: false });
    }
    tick();
    setInterval(tick, 1000);

    /* ── Role selector ── */
    let selectedRole = 'driver';

    function selectRole(role) {
      selectedRole = role;
      ['driver', 'rescue'].forEach(r => {
        document.getElementById('role-' + r).classList.toggle('active', r === role);
      });
      document.getElementById('vid').placeholder =
        role === 'rescue' ? 'e.g. RESCUE-UNIT-01' : 'e.g. KA-01-AB-1234';
    }

    /* ── Toggle password visibility ── */
    function togglePass() {
      const input = document.getElementById('pass');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    /* ── Show / hide messages ── */
    function showMsg(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.classList.add('show');
    }

    function hideMsg(id) {
      document.getElementById(id).classList.remove('show');
    }

    /* ── Login handler ── */
    function handleLogin() {
      const vid   = document.getElementById('vid').value.trim();
      const name  = document.getElementById('dname').value.trim();
      const pass  = document.getElementById('pass').value.trim();
      const btn   = document.getElementById('login-btn');

      hideMsg('err-msg');
      hideMsg('suc-msg');

      /* Basic validation */
      if (!vid || !name || !pass) {
        showMsg('err-msg', '⚠ All fields are required to authenticate.');
        return;
      }

      /* Loading state */
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="spinner" viewBox="0 0 24 24" style="stroke:#060b14;fill:none;stroke-width:2.5;stroke-linecap:round" aria-hidden="true">
          <path d="M12 2a10 10 0 0110 10" opacity="0.9"/>
        </svg>
        Authenticating...
      `;

      /* ─────────────────────────────────────────────────────
         REPLACE THIS BLOCK with your real Django API call:

         fetch('/api/vehicles/login/', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ vehicle_id: vid, driver_name: name,
                                  passcode: pass, role: selectedRole })
         })
         .then(r => r.json())
         .then(data => {
           if (data.token) {
             localStorage.setItem('gg_token', data.token);
             localStorage.setItem('gg_vehicle', vid);
             localStorage.setItem('gg_role', selectedRole);
             window.location.href =
               selectedRole === 'rescue' ? '/dashboard/' : '/map/';
           } else {
             showError(data.error || 'Authentication failed.');
           }
         })
         .catch(() => showError('Server unreachable. Check connection.'));
         ───────────────────────────────────────────────────── */

      /* Demo simulation (remove once backend is wired) */
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" style="stroke:#060b14;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
          Authenticate
        `;

        /* Simulate success */
        showMsg('suc-msg',
          '[ ACCESS GRANTED ] — Welcome, ' + name + '.\n' +
          'Role: ' + selectedRole.toUpperCase() + ' | Unit: ' + vid + '\n' +
          'Redirecting to ' + (selectedRole === 'rescue' ? 'Rescue Hub Dashboard' : 'Driver Map') + '...'
        );

        /* Redirect after 1.5s — replace href with your actual pages */
        /* Redirect after login */
setTimeout(() => {

  localStorage.setItem('gg_vehicle', vid);
  localStorage.setItem('gg_role', selectedRole);
  localStorage.setItem('gg_name', name);

  window.location.href = "ghat_guardian_dashboard_2.html";

}, 1500);
        

      }, 1800);
    }

    /* Trigger login on Enter key */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
